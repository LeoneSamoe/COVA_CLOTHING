<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in | COVA COLLECTIONS</title>
    <!-- linking my bootstrap files and js script -->
     <link rel="stylesheet" href="css/bootstrap.css">
     <script src="js/bootstrap.js"></script>
</head>
<body class="bg-black">
   
    <section class="row m--3">
        <div class="col-6 offset-3">
            <!-- card -->
             <div class="text-center">
                <div class="card">
                    <div class="card-header">
                        <h4>Sign In</h4>
                    </div>

                    <div class="card-body">
                        <!-- user to enter email or phone and password to login -->
                         <form>
                            <div class="mb-3">
                            <input type="text" placeholder="Enter your email or phone" class="form-control">
                         </div>

                         <div>
                            <div class="mb-3">
                                <input type="password" placeholder="Enter your password" class="form-control">
                            </div>

                            <button class="btn btn-outline-secondary w-100 login-btn">Log In</button>
                         </div>
                         </form>

                         <p class="text-ceter mt-3">
                            <a href="" class="text-black">Forgot password?</a>
                         </p>

                         <a href="signup.html">
                            <span class="btn btn-outline-black">Create new account</span>
                         </a>

                    </div>
                </div>
             </div>
        </div>
    </section>

</body>
</html>
