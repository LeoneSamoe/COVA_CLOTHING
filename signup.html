<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COVA COLLECTION</title>
    <!-- linking my css file -->
     <link rel="stylesheet" href="css/bootstrap.css">
     <!-- linking my javascript file -->
      <script src="js/bootstrap.js"></script>
</head>
<body class="bg-black">
       
      <!-- sign up page -->
      <!-- name of company -->
       <section class="row justify-content-center ">
        <!-- 2 columns -->
         <div class="col-md-6">
          <!-- name of our comapny,image -->
           <div class="text-center m-5">
            <h2>C O V A COLLECTIONS</h2>

            <div>
              <img src="/images/Untitled.png" alt="Company photo" height="500px" width="100%" class="img-fluid mt-4" style="border-radius:20px ;">
            </div>
           </div>
         </div>
         <div class="col-md-6 p-3">
          <!-- signup collection -->
           <div class="m-3">
            <!-- card-contains our signup input field -->
             <!-- username, password, email, phone number -->
              <div class="card shadow">
                <div class="card-header text-center bg-secondary text-white">
                  <h4>Create Account</h4>
                </div>
                <!-- card body -->
                <div>
                  <div class="card-body">
                    <!-- form to carry the input fields -->
                     <form>
                      <div class="mb-3">
                        <label for="">Full Name</label>
                        <br>
                        <input type="text" placeholder="Enter your Full name" class="form-control">
                      </div>

                      <div class="mb-3">
                          <label for="">Email</label>
                          <br>
                          <input type="text" placeholder="Enter Your Email" class="form-control">
                      </div>
                      
                      <div class="mb-3">
                        <label for="">Phone Number</label>
                        <br>
                        <input type="tel email" placeholder="Enter your phone number" class="form-control">
                      </div>

                      <div class="mb-3">
                        <label for="">Password</label>
                        <br>
                        <input type="password" placeholder="Enter your password" class="form-control">
                      </div>

                      <div class="mb-3">
                        <label for="">Confirm your password</label>
                        <br>
                        <input type="password" placeholder="Re-enter your password" class="form-control">
                      </div>

                      <!-- button -->
                       <div class="d-grid">
                        <button class="btn btn-outline-secondary">Register</button>
                       </div>

                     </form>
                     <p class="text-center mt-3 ">
                      Already have an account? <a href="signin.html" class="text-black">Sign in</a>
                    </p>

                      <a href="index.html" class="text-black">Back Home</a>
                     </p>
                  </div>
                </div>
              </div>
           </div>
         </div>
       </section>

</body>
</html>
